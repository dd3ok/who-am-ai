spring:
  application:
    name: who-am-ai
  data:
    mongodb:
      uri: ${MONGO_URI}
  ai:
    model:
      chat: google-genai
      embedding:
        text: google-genai
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          # Spring AI provider default for auto-configuration.
          # Runtime fallback order is owned by who-am-ai.ai.chat below.
          model: gemini-3.1-flash-lite
          temperature: 0.75
          max-output-tokens: 8192
        embedding:
          api-key: ${GEMINI_API_KEY}
          text:
            model: gemini-embedding-001
            dimensions: 768
            task-type: RETRIEVAL_DOCUMENT
    vectorstore:
      mongodb:
        initialize-schema: false
        collection-name: resume_chunks
        index-name: vector_index
        path-name: content_embedding
        metadata-fields-to-filter: company,skills

server:
  port: 8080

logging:
  level:
    root: WARN
    org.springframework: WARN
    com.dd3ok.whoamai: debug

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

admin:
  api-key: ${ADMIN_API_KEY:}

websocket:
  allowed-origins:
    - https://dd3ok.github.io
    - http://localhost:3000

prompts:
  system-path: classpath:prompts/system.st
  routing-instruction-path: classpath:prompts/routing-instruction.st
  routing-template-path: classpath:prompts/routing-template.st
  rag-template-path: classpath:prompts/rag-template.st
  conversational-template-path: classpath:prompts/conversational-template.st

rag:
  search:
    metadata-filter-enabled: true
    similarity-threshold: 0.65

who-am-ai:
  ai:
    chat:
      # GeminiAdapter uses these values for each request and fallback attempt.
      # Cost-efficient Gemini defaults. Check live availability, pricing, and quota:
      # https://aistudio.google.com/app/usage
      models: [gemini-3.1-flash-lite, gemini-3.5-flash, gemini-2.5-flash-lite]
      temperature: 0.75
      max-output-tokens: 8192
